<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <rect width="500" height="500" fill="#090d1a"/>
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#1f2937" stroke-width="0.5"/>
    </pattern>
    <clipPath id="jersey-clip">
      <!-- Front T-shirt Flat Pattern shape -->
      <path d="M 150 120 L 110 160 L 130 220 L 160 210 L 160 420 L 340 420 L 340 210 L 370 220 L 390 160 L 350 120 C 310 140, 190 140, 150 120 Z"/>
    </clipPath>
    <clipPath id="sleeve-left-clip">
      <path d="M 30 150 L 80 110 L 95 160 L 50 190 Z"/>
    </clipPath>
    <clipPath id="sleeve-right-clip">
      <path d="M 470 150 L 420 110 L 405 160 L 450 190 Z"/>
    </clipPath>
    <clipPath id="back-clip">
      <path d="M 150 80 L 110 120 L 130 180 L 160 170 L 160 380 L 340 380 L 340 170 L 370 180 L 390 120 L 350 80 C 310 90, 190 90, 150 80 Z"/>
    </clipPath>
  </defs>
  <rect width="500" height="500" fill="url(#grid)"/>
  
  <g>
    <!-- FRONT PANEL -->
    <g clip-path="url(#jersey-clip)">
      <rect x="100" y="100" width="300" height="350" fill="#0f172a"/>
      <!-- Lightning vectors neon style -->
      <path d="M 150 120 L 230 280 L 190 300 L 280 420 L 220 420 L 320 220 L 270 200 Z" fill="#06b6d4" opacity="0.85"/>
      <path d="M 200 120 L 270 240 L 240 250 L 300 350 L 260 350 L 330 200 L 290 190 Z" fill="#a855f7" opacity="0.85"/>
      <!-- Diagonal stripes background -->
      <line x1="100" y1="150" x2="300" y2="350" stroke="#1e293b" stroke-width="10"/>
      <line x1="200" y1="150" x2="400" y2="350" stroke="#1e293b" stroke-width="10"/>
    </g>
    <path d="M 150 120 L 110 160 L 130 220 L 160 210 L 160 420 L 340 420 L 340 210 L 370 220 L 390 160 L 350 120 C 310 140, 190 140, 150 120 Z" fill="none" stroke="#00f2fe" stroke-width="2.5"/>
    <text x="250" y="440" font-family="sans-serif" font-size="12" fill="#00f2fe" font-weight="bold" text-anchor="middle">FRENTE (DELANTERO)</text>

    <!-- SLEEVES & COLLAR -->
    <g clip-path="url(#sleeve-left-clip)">
      <rect x="20" y="100" width="100" height="100" fill="#a855f7"/>
      <path d="M 30 150 L 95 160" stroke="#06b6d4" stroke-width="10"/>
    </g>
    <path d="M 30 150 L 80 110 L 95 160 L 50 190 Z" fill="none" stroke="#00f2fe" stroke-width="1.5"/>
    
    <g clip-path="url(#sleeve-right-clip)">
      <rect x="400" y="100" width="100" height="100" fill="#a855f7"/>
      <path d="M 470 150 L 405 160" stroke="#06b6d4" stroke-width="10"/>
    </g>
    <path d="M 470 150 L 420 110 L 405 160 L 450 190 Z" fill="none" stroke="#00f2fe" stroke-width="1.5"/>

    <path d="M 200 60 Q 250 90, 300 60 L 290 50 Q 250 80, 210 50 Z" fill="#06b6d4" stroke="#00f2fe" stroke-width="1.5"/>
  </g>
  
  <text x="20" y="30" font-family="sans-serif" font-size="11" fill="#9ca3af" font-weight="bold">MODELO: TRUENO (FÚTBOL)</text>
  <text x="20" y="480" font-family="sans-serif" font-size="13" fill="#10b981" font-weight="bold">MOLDE: ESCALA 1:1 / CMYK VIBRANTE</text>
</svg>