<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" width="100%" height="100%">
  <rect width="1440" height="900" fill="#070a13"/>
  <defs>
    <!-- Background grid -->
    <pattern id="hero-grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#101524" stroke-width="1"/>
    </pattern>
    <radialGradient id="glow-1" cx="20%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#070a13" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-2" cx="80%" cy="70%" r="60%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#070a13" stop-opacity="0"/>
    </radialGradient>
    <!-- Line gradients -->
    <linearGradient id="line-grad-1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#4facfe" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="line-grad-2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#ff4e50" stop-opacity="0"/>
    </linearGradient>
  </defs>
  
  <rect width="1440" height="900" fill="url(#hero-grid)"/>
  <rect width="1440" height="900" fill="url(#glow-1)"/>
  <rect width="1440" height="900" fill="url(#glow-2)"/>
  
  <!-- Glowing vector curves mimicking a CorelDRAW path workspace -->
  <g fill="none" stroke-linecap="round">
    <!-- Blue/indigo long wave curve -->
    <path d="M -100 200 C 300 50, 600 700, 1000 450 C 1200 300, 1300 650, 1600 550" stroke="url(#line-grad-1)" stroke-width="4"/>
    <path d="M -100 200 C 300 50, 600 700, 1000 450 C 1200 300, 1300 650, 1600 550" stroke="#00f2fe" stroke-width="1.5" opacity="0.6"/>
    
    <!-- Orange/red intersect curve -->
    <path d="M -50 700 C 400 600, 800 100, 1200 400 C 1350 500, 1450 300, 1550 200" stroke="url(#line-grad-2)" stroke-width="3"/>
    
    <!-- Thin coordinate gridlines -->
    <line x1="200" y1="0" x2="200" y2="900" stroke="#1e293b" stroke-width="0.5" stroke-dasharray="5,5"/>
    <line x1="1000" y1="0" x2="1000" y2="900" stroke="#1e293b" stroke-width="0.5" stroke-dasharray="5,5"/>
    <line x1="0" y1="350" x2="1440" y2="350" stroke="#1e293b" stroke-width="0.5" stroke-dasharray="5,5"/>
    <line x1="0" y1="650" x2="1440" y2="650" stroke="#1e293b" stroke-width="0.5" stroke-dasharray="5,5"/>
    
    <!-- Vector Anchor Points (Nodes) -->
    <!-- Node 1 -->
    <rect x="375" y="195" width="10" height="10" fill="#070a13" stroke="#00f2fe" stroke-width="2"/>
    <line x1="380" y1="200" x2="430" y2="150" stroke="#00f2fe" stroke-width="1" stroke-dasharray="2,2"/>
    <circle cx="430" cy="150" r="3" fill="#00f2fe"/>
    
    <!-- Node 2 -->
    <rect x="995" y="445" width="10" height="10" fill="#070a13" stroke="#f59e0b" stroke-width="2"/>
    <line x1="1000" y1="450" x2="950" y2="520" stroke="#f59e0b" stroke-width="1" stroke-dasharray="2,2"/>
    <circle cx="950" cy="520" r="3" fill="#f59e0b"/>
  </g>
</svg>
