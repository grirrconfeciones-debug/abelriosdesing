<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <rect width="500" height="500" fill="#090d1a"/>
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#1f2937" stroke-width="0.5"/>
    </pattern>
    <clipPath id="jersey-clip">
      <!-- Front T-shirt Flat Pattern shape -->
      <path d="M 150 120 L 110 160 L 130 220 L 160 210 L 160 420 L 340 420 L 340 210 L 370 220 L 390 160 L 350 120 C 310 140, 190 140, 150 120 Z"/>
    </clipPath>
    <clipPath id="sleeve-left-clip">
      <path d="M 30 150 L 80 110 L 95 160 L 50 190 Z"/>
    </clipPath>
    <clipPath id="sleeve-right-clip">
      <path d="M 470 150 L 420 110 L 405 160 L 450 190 Z"/>
    </clipPath>
    <clipPath id="back-clip">
      <path d="M 150 80 L 110 120 L 130 180 L 160 170 L 160 380 L 340 380 L 340 170 L 370 180 L 390 120 L 350 80 C 310 90, 190 90, 150 80 Z"/>
    </clipPath>
  </defs>
  <rect width="500" height="500" fill="url(#grid)"/>
  
  <g>
    <!-- FRONT PANEL (No-sleeves Basketball Cut style) -->
    <!-- Custom clip path for basketball tank top -->
    <defs>
      <clipPath id="basketball-clip">
        <path d="M 180 120 L 150 160 L 170 230 L 170 420 L 330 420 L 330 230 L 350 160 L 320 120 C 290 145, 210 145, 180 120 Z"/>
      </clipPath>
    </defs>
    
    <g clip-path="url(#basketball-clip)">
      <rect x="100" y="100" width="300" height="350" fill="#14532d"/>
      <!-- Scales pattern / abstract lines (yellow/green) -->
      <path d="M 120 150 L 380 420" stroke="#f59e0b" stroke-width="25" opacity="0.6"/>
      <path d="M 80 200 L 340 470" stroke="#f59e0b" stroke-width="15" opacity="0.6"/>
      <path d="M 160 100 L 420 370" stroke="#10b981" stroke-width="20" opacity="0.8"/>
      
      <!-- Text placeholder "CAIMAN 10" outline -->
      <text x="250" y="260" font-family="sans-serif" font-size="32" font-weight="900" fill="#ffffff" text-anchor="middle" stroke="#000" stroke-width="2">CAIMANES</text>
      <text x="250" y="320" font-family="sans-serif" font-size="48" font-weight="900" fill="#f59e0b" text-anchor="middle" stroke="#ffffff" stroke-width="2">10</text>
    </g>
    <path d="M 180 120 L 150 160 L 170 230 L 170 420 L 330 420 L 330 230 L 350 160 L 320 120 C 290 145, 210 145, 180 120 Z" fill="none" stroke="#00f2fe" stroke-width="2.5"/>
    <text x="250" y="440" font-family="sans-serif" font-size="12" fill="#00f2fe" font-weight="bold" text-anchor="middle">FRENTE (BÁSQUET)</text>

    <!-- Collar & Armholes bands -->
    <path d="M 180 120 C 210 145, 290 145, 320 120 L 315 110 C 285 135, 215 135, 185 110 Z" fill="#f59e0b" stroke="#00f2fe" stroke-width="1"/>
  </g>
  
  <text x="20" y="30" font-family="sans-serif" font-size="11" fill="#9ca3af" font-weight="bold">MODELO: CAIMÁN (BÁSQUETBOL)</text>
  <text x="20" y="480" font-family="sans-serif" font-size="13" fill="#10b981" font-weight="bold">MOLDE: ESCALA 1:1 / TALLAS COMPLETAS</text>
</svg>